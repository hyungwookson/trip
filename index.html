<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>우리 바다 여행</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="phone">

  <!-- 입장 퀴즈 -->
  <div id="gate">
    <div class="gate-card">
      <div class="gate-emoji">♡</div>
      <div class="gate-q">손형욱이 좋아하는 사람은?</div>
      <input id="gate-input" type="text" placeholder="정답 입력" autocomplete="off" autocapitalize="off">
      <button id="gate-go">들어가기</button>
      <div id="gate-err" class="gate-err"></div>
    </div>
  </div>

  <!-- 구글 로그인 (퀴즈 통과 후, 주인만) -->
  <div id="login" class="hide">
    <div class="gate-card">
      <div class="gate-emoji">♡</div>
      <div class="gate-q">우리 둘만 들어갈 수 있어요</div>
      <button id="login-go" class="google-btn">Google로 계속하기</button>
      <div id="login-err" class="gate-err"></div>
    </div>
  </div>

  <!-- 지도 -->
  <section id="s-map" class="screen active">
    <div class="topbar">
      <div class="bar-titles">
        <div class="bar-eyebrow">our trip</div>
        <div class="bar-title">우리 바다 여행</div>
      </div>
    </div>
    <div id="map"></div>
    <div class="map-cap">
      <div class="prog-top"><b>우리가 채워가는 지도</b><span id="prog-txt">0 / 6</span></div>
      <div class="prog-bar"><div id="prog-fill"></div></div>
    </div>
  </section>

  <!-- 지역 (다녀옴 + 코스 목록) -->
  <section id="s-region" class="screen">
    <div class="topbar">
      <button class="back" aria-label="뒤로">‹</button>
      <div class="bar-titles">
        <div class="bar-eyebrow">지역</div>
        <div class="bar-title" id="region-title">지역</div>
      </div>
    </div>
    <div class="scroll" id="region-body"></div>
  </section>

  <!-- 상세 (일정표) -->
  <section id="s-detail" class="screen">
    <div class="topbar">
      <button class="back" aria-label="뒤로">‹</button>
      <div class="bar-titles">
        <div class="bar-eyebrow" id="detail-eyebrow">강릉</div>
        <div class="bar-title" id="detail-title">코스</div>
      </div>
    </div>
    <div class="scroll" id="detail-body"></div>
    <div class="note">‘좋아 / 별로’와 선택은 <b>둘이 공통으로</b> 보고 저장돼요.</div>
  </section>

  <!-- 편집 폼 (코스 / 항목 공용) -->
  <section id="s-form" class="screen">
    <div class="topbar">
      <button class="back" aria-label="뒤로">‹</button>
      <div class="bar-titles">
        <div class="bar-eyebrow">edit</div>
        <div class="bar-title" id="form-title">편집</div>
      </div>
    </div>
    <div class="scroll" id="form-body"></div>
  </section>

  <!-- 다 채웠을 때 축하 -->
  <div id="celebrate" class="hide">
    <div class="cel-card">
      <div class="cel-eyebrow">our map, complete</div>
      <div class="cel-heart">♥</div>
      <div class="cel-title">우리 지도를<br>다 채웠어</div>
      <div class="cel-sub">전국 곳곳에 우리 발자국을 남겼어요</div>
      <button id="cel-close">다시 지도 보기</button>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
